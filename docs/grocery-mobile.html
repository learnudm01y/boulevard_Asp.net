<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
  <title>Boulevard Mart — Dessert &amp; Flowers</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{font-family:'Segoe UI',Arial,sans-serif;background:#0f1117;color:#f0f0f0;min-height:100%}

    /* ── Top Bar ── */
    .topbar{position:sticky;top:0;z-index:100;background:#1a1d27;display:flex;align-items:center;padding:12px 16px;gap:10px;border-bottom:1px solid #2a2d3e}
    .back-btn{display:none;background:none;border:none;color:#7ec8e3;font-size:22px;cursor:pointer;padding:2px 6px;line-height:1}
    .back-btn.visible{display:flex;align-items:center}
    .topbar-title{flex:1;font-size:17px;font-weight:700;color:#fff;min-width:0}
    .topbar-subtitle{font-size:11px;font-weight:400;color:#7ec8e3;display:block;direction:ltr}
    .lang-btn{background:#2a2d3e;border:1px solid #7c3aed;border-radius:8px;color:#c4b5fd;font-size:12px;font-weight:700;padding:6px 10px;cursor:pointer;flex-shrink:0}
    .config-btn{background:#2a2d3e;border:1px solid #3a3d50;border-radius:8px;color:#7ec8e3;font-size:12px;padding:6px 10px;cursor:pointer;flex-shrink:0}

    /* ── Config Panel ── */
    .config-panel{display:none;background:#1a1d27;border-bottom:1px solid #2a2d3e;padding:12px 16px;gap:8px}
    .config-panel.open{display:flex;flex-wrap:wrap}
    .config-panel label{font-size:11px;color:#9ca3af;width:100%}
    .config-panel input{flex:1;background:#0f1117;border:1px solid #3a3d50;border-radius:6px;color:#f0f0f0;font-size:13px;padding:7px 10px;outline:none;min-width:0}
    .config-panel button{background:#4ade80;color:#0f1117;border:none;border-radius:6px;font-weight:700;font-size:13px;padding:7px 16px;cursor:pointer}

    /* ── Hero Banner ── */
    .hero-banner{margin:14px 14px 0;background:linear-gradient(135deg,#1d4ed8,#7c3aed);border-radius:12px;padding:16px;display:flex;align-items:center;justify-content:space-between;min-height:70px}
    .hero-banner .banner-text{font-size:13px;font-weight:700;color:#fff;max-width:65%;line-height:1.4}
    .hero-banner .banner-badge{background:rgba(255,255,255,.18);border-radius:8px;padding:6px 10px;font-size:11px;font-weight:600;color:#fff;white-space:nowrap;text-align:center}

    /* ── Category Chips ── */
    .chips-wrap{padding:14px 16px 4px;display:flex;align-items:center}
    .chips-scroll{display:flex;gap:8px;overflow-x:auto;flex:1;scrollbar-width:none;padding-bottom:2px}
    .chips-scroll::-webkit-scrollbar{display:none}
    .chip{flex-shrink:0;background:#1a1d27;border:1px solid #3a3d50;border-radius:20px;color:#9ca3af;font-size:12px;font-weight:600;padding:6px 14px;cursor:pointer;transition:all .15s;white-space:nowrap}
    .chip:hover,.chip.active{background:#1d4ed8;border-color:#1d4ed8;color:#fff}

    /* ── Category Section ── */
    .cat-section{margin-bottom:26px}
    .section-hdr{display:flex;align-items:center;justify-content:space-between;padding:18px 16px 10px;gap:8px}
    .section-hdr h2{font-size:15px;font-weight:700;color:#fff;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .sec-badge{font-size:11px;background:#1e3a5f;color:#7ec8e3;border-radius:20px;padding:3px 10px;white-space:nowrap;flex-shrink:0}
    .viewall-btn{background:none;border:1px solid #3a3d50;border-radius:8px;color:#7ec8e3;font-size:11px;font-weight:600;padding:5px 12px;cursor:pointer;flex-shrink:0;transition:border-color .15s;white-space:nowrap}
    .viewall-btn:hover{border-color:#4ade80;color:#4ade80}

    /* ── Horizontal Product Scroll ── */
    .hscroll-wrap{padding:0 16px 4px;overflow-x:auto;display:flex;gap:12px;scrollbar-width:thin;scrollbar-color:#2a2d3e transparent}
    .hscroll-wrap::-webkit-scrollbar{height:4px}
    .hscroll-wrap::-webkit-scrollbar-track{background:transparent}
    .hscroll-wrap::-webkit-scrollbar-thumb{background:#2a2d3e;border-radius:2px}
    .hscroll-wrap .prod-card{flex-shrink:0;width:148px}

    /* ── Full Grid (list screen) ── */
    #list-screen{display:none}
    .product-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:0 14px 80px}
    @media(min-width:480px){.product-grid{grid-template-columns:repeat(3,1fr)}}
    @media(min-width:720px){.product-grid{grid-template-columns:repeat(4,1fr)}}

    /* ── Product Card ── */
    .prod-card{background:#1a1d27;border-radius:12px;overflow:hidden;border:1px solid #2a2d3e;display:flex;flex-direction:column}
    .prod-img-wrap{position:relative;width:100%;aspect-ratio:1/1;background:#252836;display:flex;align-items:center;justify-content:center;overflow:hidden}
    .prod-img-wrap img{width:100%;height:100%;object-fit:cover}
    .prod-img-placeholder{font-size:32px;color:#4a4f68;position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
    .prod-discount-badge{position:absolute;top:6px;right:6px;background:#ef4444;color:#fff;font-size:10px;font-weight:700;border-radius:6px;padding:2px 6px;z-index:1}
    .prod-body{padding:9px 9px 11px;display:flex;flex-direction:column;gap:3px;flex:1}
    .prod-brand{font-size:10px;color:#6b7280;text-transform:uppercase;letter-spacing:.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .prod-name{font-size:12px;font-weight:600;color:#e2e8f0;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .prod-attr{font-size:11px;color:#9ca3af}
    .prod-price-row{display:flex;align-items:center;gap:6px;margin-top:4px;flex-wrap:wrap}
    .prod-price{font-size:14px;font-weight:700;color:#4ade80}
    .prod-price-original{font-size:11px;color:#6b7280;text-decoration:line-through}
    .prod-add-btn{margin-top:auto;background:#1d4ed8;border:none;border-radius:8px;color:#fff;font-size:12px;font-weight:600;padding:7px 0;width:100%;cursor:pointer;transition:background .15s}
    .prod-add-btn:hover{background:#2563eb}

    /* ── ICV / Origin footer ── */
    .prod-meta-footer{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-top:6px;padding-top:6px;border-top:1px solid #2a2d3e}
    .prod-meta-badge{display:inline-flex;align-items:center;gap:3px;border-radius:6px;padding:3px 7px;font-size:10px;font-weight:700;line-height:1.3;white-space:nowrap}
    .badge-icv{background:#0e2d1f;color:#4ade80;border:1px solid #166534}
    .badge-origin{background:#1e1a3e;color:#c4b5fd;border:1px solid #5b21b6}

    /* ── Skeleton ── */
    .skeleton{background:linear-gradient(90deg,#1f2235 25%,#2a2d3e 50%,#1f2235 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:8px}
    @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
    .skel-prod-h{width:148px;height:220px;flex-shrink:0;border-radius:12px}
    .skel-chip{width:80px;height:32px;border-radius:20px;flex-shrink:0}

    /* ── Empty / Error ── */
    .state-box{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;text-align:center;gap:10px;color:#6b7280}
    .state-box .si{font-size:40px}
    .state-box p{font-size:13px;line-height:1.5}
    .retry-btn{background:#1d4ed8;color:#fff;border:none;border-radius:8px;padding:8px 20px;font-size:13px;font-weight:600;cursor:pointer}

    /* ── Load-more ── */
    .load-more-wrap{padding:0 14px 24px;text-align:center}
    .load-more-btn{background:#1a1d27;border:1px solid #3a3d50;color:#7ec8e3;border-radius:10px;padding:10px 32px;font-size:13px;font-weight:600;cursor:pointer;transition:border-color .15s}
    .load-more-btn:hover{border-color:#4ade80;color:#4ade80}
    .load-more-btn:disabled{opacity:.4;cursor:default}

    /* ── Sub-section indent ── */
    .cat-section.depth-1 .section-hdr{padding-right:28px;padding-left:28px}
    .cat-section.depth-1 .hscroll-wrap{padding-left:28px}
    .cat-section.depth-2 .section-hdr{padding-right:44px;padding-left:44px}
    .cat-section.depth-2 .hscroll-wrap{padding-left:44px}

    /* ── RTL fixes ── */
    [dir=rtl] .topbar,[dir=rtl] .section-hdr,[dir=rtl] .chips-wrap{flex-direction:row-reverse}
    [dir=rtl] .hscroll-wrap{direction:rtl}
    [dir=rtl] .chips-scroll{direction:rtl}
    [dir=rtl] .prod-body,[dir=rtl] .section-hdr h2{text-align:right}
    [dir=rtl] .prod-price-row{flex-direction:row-reverse}
    [dir=rtl] .prod-discount-badge{right:auto;left:6px}
    [dir=rtl] .cat-section.depth-1 .section-hdr{padding-left:16px;padding-right:28px}
    [dir=rtl] .cat-section.depth-1 .hscroll-wrap{padding-right:28px;padding-left:16px}
    [dir=rtl] .cat-section.depth-2 .section-hdr{padding-left:16px;padding-right:44px}
    [dir=rtl] .cat-section.depth-2 .hscroll-wrap{padding-right:44px;padding-left:16px}
  </style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <button class="back-btn" id="back-btn" onclick="goBack()">&#8592;</button>
  <div style="flex:1;min-width:0">
    <span class="topbar-title" id="topbar-title">Boulevard Mart</span>
    <span class="topbar-subtitle" id="topbar-subtitle">Dessert &amp; Flowers</span>
  </div>
  <button id="lang-btn" class="lang-btn" onclick="toggleLang()">EN</button>
  <button class="config-btn" onclick="toggleConfig()">&#9881;</button>
</div>

<!-- CONFIG PANEL -->
<div class="config-panel" id="config-panel">
  <label>Base URL (e.g. https://boulevard.r-y-x.net)</label>
  <input type="text" id="base-url-input" placeholder="https://boulevard.r-y-x.net"/>
  <button onclick="applyConfig()">Apply</button>
</div>

<!-- ═══ BROWSE SCREEN ═══ -->
<div id="browse-screen">
  <div class="hero-banner">
    <div class="banner-text" id="hero-text">FRESH ARABIC SWEETS<br>DELIVERED TO YOUR DOOR</div>
    <div class="banner-badge" id="hero-badge">Desserts<br>&amp; Flowers 🍮</div>
  </div>
  <div class="chips-wrap">
    <div class="chips-scroll" id="chips-row">
      <div class="skeleton skel-chip"></div>
      <div class="skeleton skel-chip"></div>
      <div class="skeleton skel-chip"></div>
    </div>
  </div>
  <div id="sections-container"></div>
</div>

<!-- ═══ LIST SCREEN (View All) ═══ -->
<div id="list-screen">
  <div class="section-hdr" style="padding-top:20px">
    <h2 id="list-title"></h2>
    <span class="sec-badge" id="list-badge"></span>
  </div>
  <div class="product-grid" id="list-grid"></div>
  <div class="load-more-wrap" id="list-load-more-wrap" style="display:none">
    <button class="load-more-btn" id="list-load-more-btn" onclick="listLoadMore()">Load More</button>
  </div>
</div>

<script>
// ════════════ Config ════════════
var GROCERY_FC_KEY = '88d5d23e-470f-409a-bb6b-def7ab1346fa'; // Dessert & Flowers
var H_PAGE_SIZE = 8;
var PAGE_SIZE   = 20;

var BASE_URL = localStorage.getItem('blvd_base_url') || 'https://boulevard.r-y-x.net';
var lang     = localStorage.getItem('blvd_lang')     || 'ar';

var groceryFcId     = 0;
var categoryTree    = [];
var sectionState    = {};   // id -> 'pending'|'loading'|'done'|'empty'

var listCatId     = 0;
var listPage      = 0;
var listHasMore   = true;
var listNameEn    = '';
var listNameAr    = '';

document.getElementById('base-url-input').value = BASE_URL;

// ════════════ Config UI ════════════
function toggleConfig() {
  document.getElementById('config-panel').classList.toggle('open');
}
function applyConfig() {
  BASE_URL = document.getElementById('base-url-input').value.replace(/\/$/, '');
  localStorage.setItem('blvd_base_url', BASE_URL);
  toggleConfig();
  groceryFcId = 0; categoryTree = []; sectionState = {};
  initPage();
}

// ════════════ Language ════════════
function t(en, ar) {
  return (lang === 'ar' && ar && String(ar).trim()) ? ar : (en || '');
}
function applyLang() {
  var isAr = lang === 'ar';
  document.documentElement.setAttribute('dir', isAr ? 'rtl' : 'ltr');
  document.documentElement.setAttribute('lang', lang);
  document.getElementById('lang-btn').textContent = isAr ? 'EN' : 'عربي';
  document.getElementById('hero-text').innerHTML  =
    t('FRESH ARABIC SWEETS<br>DELIVERED TO YOUR DOOR', 'حلويات عربية طازجة<br>توصيل لباب بيتك');
  document.getElementById('hero-badge').innerHTML =
    t('Desserts<br>&amp; Flowers 🍮', 'حلويات<br>وزهور 🍮');
}
function toggleLang() {
  lang = lang === 'ar' ? 'en' : 'ar';
  localStorage.setItem('blvd_lang', lang);
  applyLang();
  // Re-render section header titles
  document.querySelectorAll('[data-cat-id]').forEach(function(el) {
    var id   = el.getAttribute('data-cat-id');
    var nameEn = el.getAttribute('data-name-en') || '';
    var nameAr = el.getAttribute('data-name-ar') || '';
    el.textContent = t(nameEn, nameAr) || t('Category','فئة');
  });
  // Update viewall buttons
  document.querySelectorAll('[data-viewall-id]').forEach(function(btn) {
    btn.textContent = t('View All','عرض الكل');
  });
  // Update list screen title if open
  if (listCatId) {
    document.getElementById('list-title').textContent      = t(listNameEn, listNameAr);
    document.getElementById('topbar-title').textContent    = t(listNameEn, listNameAr);
    document.getElementById('topbar-subtitle').textContent = t('Boulevard Mart','بوليفارد مارت');
  }
  // Update chips
  document.querySelectorAll('[data-chip-en]').forEach(function(chip) {
    chip.textContent = t(chip.getAttribute('data-chip-en'), chip.getAttribute('data-chip-ar'));
  });
  var allChip = document.getElementById('chip-all');
  if (allChip) allChip.textContent = t('All','الكل');
}

// ════════════ API Helper ════════════
function apiFetch(path, retries) {
  retries = (retries === undefined) ? 3 : retries;
  var url = BASE_URL + path;
  var ctrl = new AbortController();
  var timer = setTimeout(function(){ ctrl.abort(); }, 30000); // 30s timeout
  return fetch(url, { signal: ctrl.signal })
  .then(function(res) {
    clearTimeout(timer);
    if (!res.ok) throw new Error('HTTP ' + res.status + ' — ' + url);
    return res.json();
  }).then(function(json) {
    if (json && json.result !== undefined) return json.result;
    if (json && json.data  !== undefined) return json.data;
    if (Array.isArray(json)) return json;
    throw new Error(json.message || 'API error');
  }).catch(function(err) {
    clearTimeout(timer);
    // ERR_CONNECTION_REFUSED or AbortError → retry with backoff (server warming up)
    var isNetErr = err.name === 'AbortError' || err.message.indexOf('Failed to fetch') !== -1 || err.message.indexOf('NetworkError') !== -1;
    if (isNetErr && retries > 0) {
      var delay = (4 - retries) * 3000; // 3s, 6s, 9s
      return new Promise(function(resolve, reject) {
        setTimeout(function() { apiFetch(path, retries - 1).then(resolve).catch(reject); }, delay);
      });
    }
    throw err;
  });
}

// ════════════ Resolve Grocery FC id ════════════
function resolveGroceryFcId() {
  if (groceryFcId > 0) return Promise.resolve(groceryFcId);
  return apiFetch('/api/v1/GetAllfeatureCategory').then(function(list) {
    var found = (list || []).filter(function(fc) {
      return String(fc.featureCategoryKey || '').toLowerCase() === GROCERY_FC_KEY.toLowerCase();
    })[0];
    if (!found) throw new Error('Dessert & Flowers feature category not found in DB.');
    groceryFcId = found.featureCategoryId;
    return groceryFcId;
  });
}

// ════════════ Flatten tree ════════════
function flatten(cats, depth, result) {
  (cats || []).forEach(function(cat) {
    result.push({ cat: cat, depth: depth });
    if (cat.childCategories && cat.childCategories.length)
      flatten(cat.childCategories, depth + 1, result);
  });
  return result;
}

// ════════════ Render Category Chips ════════════
function renderChips(rootCats) {
  var row = document.getElementById('chips-row');
  row.innerHTML = '';

  var allChip = document.createElement('button');
  allChip.className = 'chip active';
  allChip.id = 'chip-all';
  allChip.textContent = t('All','الكل');
  allChip.onclick = function() {
    document.querySelectorAll('.chip').forEach(function(c){ c.classList.remove('active'); });
    allChip.classList.add('active');
    var sc = document.getElementById('sections-container');
    if (sc) sc.scrollIntoView({ behavior:'smooth', block:'start' });
  };
  row.appendChild(allChip);

  (rootCats || []).forEach(function(cat) {
    var id   = cat.categoryId   || cat.CategoryId;
    var enNm = cat.categoryName   || cat.CategoryName   || '';
    var arNm = cat.categoryNameAr || cat.CategoryNameAr || '';
    var chip = document.createElement('button');
    chip.className = 'chip';
    chip.textContent = t(enNm, arNm) || 'Category';
    chip.setAttribute('data-chip-en', enNm);
    chip.setAttribute('data-chip-ar', arNm);
    chip.onclick = function() {
      document.querySelectorAll('.chip').forEach(function(c){ c.classList.remove('active'); });
      chip.classList.add('active');
      var sec = document.getElementById('cat-sec-' + id);
      if (sec) sec.scrollIntoView({ behavior:'smooth', block:'start' });
    };
    row.appendChild(chip);
  });
}

// ════════════ Render all sections ════════════
function renderSections(flatList) {
  var container = document.getElementById('sections-container');
  container.innerHTML = '';

  flatList.forEach(function(item) {
    var cat   = item.cat;
    var depth = item.depth;
    var id    = cat.categoryId   || cat.CategoryId;
    var enNm  = cat.categoryName   || cat.CategoryName   || '';
    var arNm  = cat.categoryNameAr || cat.CategoryNameAr || '';
    var name  = t(enNm, arNm) || t('Category','فئة');

    sectionState[id] = 'pending';

    var sec = document.createElement('div');
    sec.className = 'cat-section' + (depth > 0 ? ' depth-' + Math.min(depth,2) : '');
    sec.id = 'cat-sec-' + id;

    var enEsc = enNm.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    var arEsc = arNm.replace(/\\/g,'\\\\').replace(/'/g,"\\'");

    sec.innerHTML =
      '<div class="section-hdr">' +
        '<h2 data-cat-id="' + id + '" data-name-en="' + escAttr(enNm) + '" data-name-ar="' + escAttr(arNm) + '">' +
          escHtml(name) +
        '</h2>' +
        '<span class="sec-badge" id="sec-badge-' + id + '">…</span>' +
        '<button class="viewall-btn" data-viewall-id="' + id + '" onclick="viewAll(' + id + ',\'' + enEsc + '\',\'' + arEsc + '\')">' +
          t('View All','عرض الكل') +
        '</button>' +
      '</div>' +
      '<div class="hscroll-wrap" id="hscroll-' + id + '">' +
        '<div class="skeleton skel-prod-h"></div>' +
        '<div class="skeleton skel-prod-h"></div>' +
        '<div class="skeleton skel-prod-h"></div>' +
        '<div class="skeleton skel-prod-h"></div>' +
      '</div>';

    container.appendChild(sec);
  });
}

// ════════════ Lazy-load via IntersectionObserver ════════════
var io;
function observeAll() {
  if (io) io.disconnect();
  io = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (!entry.isIntersecting) return;
      var id = parseInt(entry.target.id.replace('cat-sec-',''));
      if (!id || sectionState[id] !== 'pending') return;
      sectionState[id] = 'loading';
      io.unobserve(entry.target);
      loadSection(id);
    });
  }, { rootMargin: '300px' });

  document.querySelectorAll('.cat-section').forEach(function(sec) {
    var id = parseInt(sec.id.replace('cat-sec-',''));
    if (sectionState[id] === 'pending') io.observe(sec);
  });
}

// ════════════ Load products for one section ════════════
function loadSection(catId) {
  var wrap  = document.getElementById('hscroll-' + catId);
  var badge = document.getElementById('sec-badge-' + catId);
  if (!wrap) return;

  apiFetch('/api/v1/general/GetSingelCategorywiseProduct?categoryId=' + catId +
    '&size=' + H_PAGE_SIZE + '&count=0&productType=1&lang=' + lang)
  .then(function(data) {
    var products = (data && data.products) ? data.products
      : Array.isArray(data) ? data : [];
    sectionState[catId] = products.length === 0 ? 'empty' : 'done';

    if (products.length === 0) {
      wrap.innerHTML =
        '<div style="padding:20px 0;display:flex;flex-direction:column;align-items:center;gap:8px;color:#6b7280;min-width:100%">' +
        '<span style="font-size:28px">📭</span>' +
        '<span style="font-size:12px">' + t('No products yet','لا توجد منتجات') + '</span></div>';
      badge.textContent = '0';
    } else {
      wrap.innerHTML = products.map(function(p){ return buildProdCard(p); }).join('');
      badge.textContent = products.length + (products.length >= H_PAGE_SIZE ? '+' : '');
    }
  })
  .catch(function(err) {
    sectionState[catId] = 'pending';
    wrap.innerHTML =
      '<div style="padding:20px;display:flex;flex-direction:column;align-items:center;gap:8px;color:#6b7280;min-width:140px">' +
      '<span style="font-size:24px">⚠️</span>' +
      '<span style="font-size:11px">' + escHtml(err.message) + '</span>' +
      '<button class="retry-btn" style="font-size:11px;padding:5px 12px" onclick="sectionState[' + catId + ']=' +
        '\'pending\';io && io.observe(document.getElementById(\'cat-sec-' + catId + '\'));loadSection(' + catId + ')">' +
        t('Retry','إعادة') + '</button></div>';
    badge.textContent = '!';
  });
}

// ════════════ Build product card ════════════
function buildProdCard(p) {
  var name  = p.productName  || p.ProductName  || t('Product','منتج');
  var img   = p.image        || p.Image        || '';
  var price = parseFloat(p.productPrice || p.ProductPrice || 0);
  var dp    = parseFloat(p.discountPrice || p.DiscountPrice || 0);
  var hasD  = dp > 0 && dp < price;
  var shown = hasD ? dp : price;

  var bi    = p.brandInfo || p.BrandInfo;
  var brand = bi ? t(bi.title||bi.Title||'', bi.titleAr||bi.TitleAr||'') : '';
  var attr  = p.attributeName || p.AttributeName || '';

  var discPct = '';
  var di = p.discountInformation || p.DiscountInformation;
  if (di && (di.discountType||di.DiscountType) === 'Percentage')
    discPct = '-' + (di.discountAmount||di.DiscountAmount) + '%';

  // ICV + Origin
  var icv    = p.icvBoulevardScore || p.IcvBoulevardScore || '';
  var origin = p.origin            || p.Origin            || '';

  // Normalize URL: fix double-slash produced by server bug (e.g. http://host//path)
  var imgSrc = img
    ? img.replace(/([^:])\/\/+/g, '$1/')
    : '';

  var inner  = imgSrc
    ? '<img src="' + escHtml(imgSrc) + '" alt="' + escHtml(name) + '" loading="lazy" ' +
        'onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'">' +
        '<div class="prod-img-placeholder" style="display:none">🛍️</div>'
    : '<div class="prod-img-placeholder">🛍️</div>';

  return '<div class="prod-card">' +
    '<div class="prod-img-wrap">' + inner +
      (discPct ? '<div class="prod-discount-badge">' + escHtml(discPct) + '</div>' : '') +
    '</div>' +
    '<div class="prod-body">' +
      (brand ? '<div class="prod-brand">' + escHtml(brand)  + '</div>' : '') +
      '<div class="prod-name">'  + escHtml(name)  + '</div>' +
      (attr  ? '<div class="prod-attr">'  + escHtml(attr)   + '</div>' : '') +
      '<div class="prod-price-row">' +
        '<span class="prod-price">' + shown.toFixed(2) + ' AED</span>' +
        (hasD ? '<span class="prod-price-original">' + price.toFixed(2) + ' AED</span>' : '') +
      '</div>' +
      '<button class="prod-add-btn">' + t('+ Add to Cart','+ أضف للسلة') + '</button>' +
      (icv || origin
        ? '<div class="prod-meta-footer">' +
            (icv    ? '<span class="prod-meta-badge badge-icv">ICV ' + escHtml(icv) + '</span>' : '') +
            (origin ? '<span class="prod-meta-badge badge-origin">' + escHtml(origin) + '</span>' : '') +
          '</div>'
        : '') +
    '</div>' +
  '</div>';
}

// ════════════ View All ════════════
function viewAll(catId, nameEn, nameAr) {
  listCatId   = catId;
  listNameEn  = nameEn;
  listNameAr  = nameAr;
  listPage    = 0;
  listHasMore = true;

  var title = t(nameEn, nameAr) || t('Products','المنتجات');
  document.getElementById('list-title').textContent      = title;
  document.getElementById('topbar-title').textContent    = title;
  document.getElementById('topbar-subtitle').textContent = t('Boulevard Mart','بوليفارد مارت');
  document.getElementById('list-badge').textContent      = '';
  document.getElementById('list-load-more-wrap').style.display = 'none';

  document.getElementById('browse-screen').style.display = 'none';
  document.getElementById('list-screen').style.display   = 'block';
  document.getElementById('back-btn').classList.add('visible');
  window.scrollTo(0,0);

  var grid = document.getElementById('list-grid');
  grid.innerHTML =
    '<div class="skeleton" style="height:240px;border-radius:12px"></div>' +
    '<div class="skeleton" style="height:240px;border-radius:12px"></div>' +
    '<div class="skeleton" style="height:240px;border-radius:12px"></div>' +
    '<div class="skeleton" style="height:240px;border-radius:12px"></div>';

  fetchListPage(0, true);
}

function fetchListPage(page, replace) {
  var grid   = document.getElementById('list-grid');
  var badge  = document.getElementById('list-badge');
  var lmWrap = document.getElementById('list-load-more-wrap');
  var lmBtn  = document.getElementById('list-load-more-btn');
  if (!replace) lmBtn.disabled = true;

  apiFetch('/api/v1/general/GetSingelCategorywiseProduct?categoryId=' + listCatId +
    '&size=' + PAGE_SIZE + '&count=' + page + '&productType=1&lang=' + lang)
  .then(function(data) {
    var products = (data && data.products) ? data.products
      : Array.isArray(data) ? data : [];

    if (replace) {
      if (products.length === 0) {
        grid.innerHTML = '<div class="state-box" style="grid-column:1/-1"><span class="si">📭</span>' +
          '<p>' + t('No products in this category.','لا توجد منتجات في هذه الفئة.') + '</p></div>';
        badge.textContent = '0';
        lmWrap.style.display = 'none';
        return;
      }
      grid.innerHTML = products.map(function(p){ return buildProdCard(p); }).join('');
    } else {
      products.forEach(function(p) {
        grid.insertAdjacentHTML('beforeend', buildProdCard(p));
      });
    }

    var total = grid.querySelectorAll('.prod-card').length;
    badge.textContent = total + (products.length >= PAGE_SIZE ? '+' : '');

    listHasMore = products.length >= PAGE_SIZE;
    lmWrap.style.display = listHasMore ? 'block' : 'none';
    if (listHasMore) { lmBtn.disabled = false; }
    lmBtn.textContent = t('Load More','تحميل المزيد');
    listPage = page + 1;
  })
  .catch(function(err) {
    if (replace) {
      grid.innerHTML = '<div class="state-box" style="grid-column:1/-1"><span class="si">⚠️</span>' +
        '<p>' + escHtml(err.message) + '</p>' +
        '<button class="retry-btn" onclick="fetchListPage(0,true)">' + t('Retry','إعادة') + '</button></div>';
    }
    lmWrap.style.display = 'none';
  });
}

function listLoadMore() { if (listHasMore) fetchListPage(listPage, false); }

// ════════════ Back ════════════
function goBack() {
  document.getElementById('list-screen').style.display   = 'none';
  document.getElementById('browse-screen').style.display = 'block';
  document.getElementById('back-btn').classList.remove('visible');
  document.getElementById('topbar-title').textContent    = t('Boulevard Mart','بوليفارد مارت');
  document.getElementById('topbar-subtitle').textContent = t('Dessert & Flowers','الحلويات والزهور');
  listCatId = 0;
  window.scrollTo(0,0);
}

// ════════════ Main init ════════════
function initPage() {
  var container = document.getElementById('sections-container');
  container.innerHTML =
    '<div class="state-box"><span class="si">⏳</span>' +
    '<p>' + t('Loading categories...','جارِ تحميل التصنيفات...') + '</p></div>';
  document.getElementById('chips-row').innerHTML =
    '<div class="skeleton skel-chip"></div>' +
    '<div class="skeleton skel-chip"></div>' +
    '<div class="skeleton skel-chip"></div>';

  resolveGroceryFcId()
  .then(function(fcId) {
    return apiFetch('/api/v1/general/categories?featureCategoryid=' + fcId);
  })
  .then(function(rootCats) {
    categoryTree = Array.isArray(rootCats) ? rootCats : [];

    if (categoryTree.length === 0) {
      document.getElementById('chips-row').innerHTML = '';
      document.getElementById('sections-container').innerHTML =
        '<div class="state-box"><span class="si">🛒</span>' +
        '<p>' + t('No categories found. Import grocery data first.',
                  'لا توجد تصنيفات. يرجى استيراد البيانات أولاً.') + '</p></div>';
      return;
    }

    renderChips(categoryTree);

    var flat = flatten(categoryTree, 0, []);
    renderSections(flat);
    observeAll();
  })
  .catch(function(err) {
    document.getElementById('chips-row').innerHTML = '';
    document.getElementById('sections-container').innerHTML =
      '<div class="state-box"><span class="si">⚠️</span>' +
      '<p>' + escHtml(err.message) + '</p>' +
      '<button class="retry-btn" onclick="initPage()">' + t('Retry','إعادة المحاولة') + '</button></div>';
  });
}

// ════════════ Utils ════════════
function escHtml(s) {
  return String(s||'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function escAttr(s) {
  return String(s||'').replace(/"/g,'&quot;');
}

// ════════════ Boot ════════════
applyLang();
initPage();
</script>
